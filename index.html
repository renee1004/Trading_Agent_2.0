
<style>
*{box-sizing:border-box;margin:0;padding:0}
.shell{display:grid;grid-template-rows:48px 1fr;height:580px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-primary)}
.topbar{display:flex;align-items:center;gap:12px;padding:0 16px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary)}
.logo{font-family:var(--font-mono);font-size:11px;letter-spacing:3px;color:#1D9E75;text-transform:uppercase;font-weight:500}
.dot{width:6px;height:6px;border-radius:50%;background:#1D9E75;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.clock{font-family:var(--font-mono);font-size:11px;color:var(--color-text-tertiary);margin-left:auto}
.body{display:grid;grid-template-columns:180px 1fr;overflow:hidden}
.sidebar{background:var(--color-background-secondary);border-right:0.5px solid var(--color-border-tertiary);overflow-y:auto;padding:12px 0}
.sib-hd{font-size:10px;letter-spacing:2px;color:var(--color-text-tertiary);padding:0 12px 8px;font-family:var(--font-mono)}
.sym-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;border:none;background:transparent;cursor:pointer;text-align:left;transition:background .12s;border-left:2px solid transparent}
.sym-btn:hover{background:var(--color-background-primary)}
.sym-btn.active{background:var(--color-background-primary);border-left-color:#1D9E75}
.sym-code{font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--color-text-primary)}
.sym-name{font-size:11px;color:var(--color-text-tertiary)}
.sym-sig{margin-left:auto;font-size:10px;font-family:var(--font-mono);padding:2px 5px;border-radius:4px;font-weight:500}
.sig-buy{background:#E1F5EE;color:#0F6E56}
.sig-sell{background:#FCEBEB;color:#A32D2D}
.sig-hold{background:var(--color-background-secondary);color:var(--color-text-tertiary)}
.main{overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.ph{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap}
.ph-sym{font-family:var(--font-mono);font-size:22px;font-weight:500;color:#1D9E75}
.ph-name{font-size:12px;color:var(--color-text-tertiary);margin-bottom:3px}
.ph-price{font-family:var(--font-mono);font-size:28px;font-weight:500;color:var(--color-text-primary)}
.ph-chg{font-family:var(--font-mono);font-size:12px;padding:3px 8px;border-radius:var(--border-radius-md);margin-bottom:4px}
.chg-up{background:#E1F5EE;color:#0F6E56}
.chg-dn{background:#FCEBEB;color:#A32D2D}
.ph-upd{font-size:11px;color:var(--color-text-tertiary);margin-left:auto;font-family:var(--font-mono)}
.banner{padding:12px 16px;border-radius:var(--border-radius-md);display:flex;align-items:center;gap:12px;border:0.5px solid}
.b-buy{background:#E1F5EE;border-color:#5DCAA5}
.b-sell{background:#FCEBEB;border-color:#F09595}
.b-hold{background:var(--color-background-secondary);border-color:var(--color-border-tertiary)}
.bn-icon{font-family:var(--font-mono);font-size:18px;font-weight:500;width:28px;text-align:center}
.c-g{color:#0F6E56}.c-r{color:#A32D2D}.c-m{color:var(--color-text-tertiary)}
.bn-label{font-family:var(--font-mono);font-size:14px;font-weight:500}
.bn-str{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
.bn-reason{font-size:12px;color:var(--color-text-secondary);border-left:0.5px solid var(--color-border-tertiary);padding-left:12px;line-height:1.6}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.met{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.met-lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:1px;color:var(--color-text-tertiary);margin-bottom:6px;text-transform:uppercase}
.met-val{font-family:var(--font-mono);font-size:17px;font-weight:500}
.met-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:3px}
.chart-panel{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px 14px}
.cp-hd{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;color:var(--color-text-tertiary);margin-bottom:10px}
.log-panel{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px 14px}
.log-hd{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;color:var(--color-text-tertiary);margin-bottom:10px}
.log-entry{display:flex;gap:10px;padding:5px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-family:var(--font-mono);font-size:11px;align-items:center}
.log-entry:last-child{border-bottom:none}
.log-t{color:var(--color-text-tertiary);min-width:52px}
.log-sym{color:var(--color-text-primary);font-weight:500;min-width:70px}
.log-act{padding:2px 6px;border-radius:3px;font-size:10px;font-weight:500}
.act-buy{background:#E1F5EE;color:#0F6E56}
.act-sell{background:#FCEBEB;color:#A32D2D}
.act-hold{background:var(--color-background-secondary);color:var(--color-text-tertiary)}
.log-rsn{color:var(--color-text-tertiary);font-size:10px}
.refresh-btn{font-family:var(--font-mono);font-size:10px;color:var(--color-text-tertiary);border:0.5px solid var(--color-border-tertiary);background:transparent;padding:4px 10px;border-radius:var(--border-radius-md);cursor:pointer}
.refresh-btn:hover{color:#1D9E75;border-color:#5DCAA5}
</style>

<div class="shell">
  <header class="topbar">
    <div class="dot"></div>
    <div class="logo">KIS Trading</div>
    <button class="refresh-btn" onclick="render(currentSym)">↻ 새로고침</button>
    <div class="clock" id="clk">--:--:--</div>
  </header>
  <div class="body">
    <nav class="sidebar">
      <div class="sib-hd">WATCHLIST</div>
      <div id="symList"></div>
    </nav>
    <main class="main" id="main"></main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const SYMBOLS = {
  "005930":"삼성전자","000660":"SK하이닉스","035420":"NAVER",
  "AAPL":"애플","NVDA":"엔비디아","TSLA":"테슬라"
};

const MOCK = {
  "005930":{price:73400,change:+1.24,rsi:52.3,ma5:72800,ma20:71200,macd:320,macd_sig:210,action:"BUY",strength:"보통",reason:"MA골든크로스 · MACD상승",currency:"KRW"},
  "000660":{price:148500,change:-0.67,rsi:44.1,ma5:149200,ma20:151000,macd:-180,macd_sig:-90,action:"HOLD",strength:"약함",reason:"MA데드크로스 · RSI중립(44.1) · MACD하락",currency:"KRW"},
  "035420":{price:186000,change:+0.54,rsi:38.2,ma5:184500,ma20:183000,macd:120,macd_sig:80,action:"BUY",strength:"약함",reason:"MA골든크로스 · MACD상승",currency:"KRW"},
  "AAPL":  {price:213.45,change:+0.89,rsi:61.4,ma5:211.2,ma20:208.5,macd:1.23,macd_sig:0.98,action:"BUY",strength:"강함",reason:"복합매수 [MA골든 · MACD↑]",currency:"USD"},
  "NVDA":  {price:892.30,change:-1.23,rsi:72.8,ma5:896.1,ma20:882.0,macd:-2.1,macd_sig:0.4,action:"SELL",strength:"강함",reason:"RSI과매수(72.8) · MACD↓",currency:"USD"},
  "TSLA":  {price:174.50,change:+2.11,rsi:28.6,ma5:172.3,ma20:176.8,macd:-0.8,macd_sig:-1.2,action:"BUY",strength:"강함",reason:"RSI과매도(28.6) · MACD↑",currency:"USD"},
};

let currentSym = "005930";
let chartInst = null;

setInterval(()=>{
  document.getElementById("clk").textContent = new Date().toLocaleTimeString("ko-KR");
},1000);

function buildSidebar(){
  const el = document.getElementById("symList");
  el.innerHTML = Object.entries(SYMBOLS).map(([sym,name])=>{
    const d = MOCK[sym];
    const sc = d.action==="BUY"?"sig-buy":d.action==="SELL"?"sig-sell":"sig-hold";
    return `<button class="sym-btn${sym===currentSym?" active":""}" id="btn-${sym}" onclick="selectSym('${sym}')">
      <div><div class="sym-code">${sym}</div><div class="sym-name">${name}</div></div>
      <div class="sym-sig ${sc}">${d.action}</div>
    </button>`;
  }).join("");
}

function selectSym(sym){
  currentSym = sym;
  document.querySelectorAll(".sym-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("btn-"+sym)?.classList.add("active");
  render(sym);
}

function render(sym){
  const d = MOCK[sym];
  const name = SYMBOLS[sym];
  const isKR = d.currency==="KRW";
  const pfmt = v => isKR ? v.toLocaleString("ko-KR")+"원" : "$"+v.toFixed(2);
  const actCls = d.action==="BUY"?"b-buy":d.action==="SELL"?"b-sell":"b-hold";
  const ic = d.action==="BUY"?"▲":d.action==="SELL"?"▼":"—";
  const lbl = d.action==="BUY"?"매수 신호":d.action==="SELL"?"매도 신호":"관망";
  const cc = d.action==="BUY"?"c-g":d.action==="SELL"?"c-r":"c-m";
  const chgCls = d.change>=0?"chg-up":"chg-dn";
  const rsiC = d.rsi<30?"c-g":d.rsi>70?"c-r":"c-m";
  const maC = d.ma5>d.ma20?"c-g":"c-r";
  const macdC = d.macd>d.macd_sig?"c-g":"c-r";
  const now = new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});

  document.getElementById("main").innerHTML = `
    <div class="ph">
      <div><div class="ph-sym">${sym}</div><div class="ph-name">${name}</div></div>
      <div>
        <div class="ph-price">${pfmt(d.price)}</div>
        <div class="ph-chg ${chgCls}">${d.change>=0?"+":""}${d.change.toFixed(2)}%</div>
      </div>
      <div class="ph-upd">실시간 · ${now}</div>
    </div>
    <div class="banner ${actCls}">
      <div class="bn-icon ${cc}">${ic}</div>
      <div>
        <div class="bn-label ${cc}">${lbl} · ${d.strength}</div>
        <div class="bn-str">복합 전략 (MA + RSI + MACD)</div>
      </div>
      <div class="bn-reason">${d.reason}</div>
    </div>
    <div class="metrics">
      <div class="met"><div class="met-lbl">RSI (14)</div><div class="met-val ${rsiC}">${d.rsi}</div><div class="met-sub">${d.rsi<30?"과매도":d.rsi>70?"과매수":"중립"}</div></div>
      <div class="met"><div class="met-lbl">MA 크로스</div><div class="met-val ${maC}">${d.ma5>d.ma20?"골든":"데드"}</div><div class="met-sub">MA5 vs MA20</div></div>
      <div class="met"><div class="met-lbl">MACD</div><div class="met-val ${macdC}">${d.macd>0?"+":""}${d.macd.toFixed(2)}</div><div class="met-sub">Sig: ${d.macd_sig.toFixed(2)}</div></div>
    </div>
    <div class="chart-panel"><div class="cp-hd">PRICE CHART — 60D (시뮬레이션)</div><canvas id="pc" height="90"></canvas></div>
    <div class="log-panel">
      <div class="log-hd">SIGNAL LOG</div>
      ${Object.entries(MOCK).map(([s,v])=>{
        const ac = v.action==="BUY"?"act-buy":v.action==="SELL"?"act-sell":"act-hold";
        const t = new Date(Date.now()-Math.random()*3600000).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
        return `<div class="log-entry"><span class="log-t">${t}</span><span class="log-sym">${s}</span><span class="log-act ${ac}">${v.action}</span><span class="log-rsn">${v.reason}</span></div>`;
      }).join("")}
    </div>`;

  drawChart(sym, d);
}

function drawChart(sym, d){
  const ctx = document.getElementById("pc")?.getContext("2d");
  if(!ctx) return;
  if(chartInst){chartInst.destroy();chartInst=null;}
  const base = d.price;
  const prices = Array.from({length:60},(_,i)=>{
    const noise = (Math.random()-0.49)*0.018;
    return parseFloat((base*(1+noise*(60-i)/30)).toFixed(d.currency==="KRW"?0:2));
  });
  prices[59] = d.price;
  const ma20 = prices.map((_,i)=>i<19?null:parseFloat((prices.slice(i-19,i+1).reduce((a,b)=>a+b,0)/20).toFixed(2)));
  const labels = Array.from({length:60},(_,i)=>{
    const dt = new Date(); dt.setDate(dt.getDate()-(59-i));
    return dt.toLocaleDateString("ko-KR",{month:"numeric",day:"numeric"});
  });

  chartInst = new Chart(ctx,{
    data:{labels,datasets:[
      {type:"line",data:prices,borderColor:"#1D9E75",borderWidth:1.5,pointRadius:0,fill:true,backgroundColor:"rgba(29,158,117,0.06)",tension:0.3},
      {type:"line",data:ma20,borderColor:"#BA7517",borderWidth:1,pointRadius:0,fill:false,borderDash:[4,3],tension:0.3,spanGaps:true},
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:"var(--color-background-secondary)",borderColor:"var(--color-border-tertiary)",borderWidth:1,titleColor:"var(--color-text-tertiary)",bodyColor:"var(--color-text-primary)"}},
      scales:{
        x:{display:true,ticks:{maxTicksLimit:5,color:"var(--color-text-tertiary)",font:{size:10,family:"var(--font-mono)"}},grid:{color:"var(--color-border-tertiary)"}},
        y:{display:true,ticks:{maxTicksLimit:4,color:"var(--color-text-tertiary)",font:{size:10,family:"var(--font-mono)"}},grid:{color:"var(--color-border-tertiary)"}},
      }
    }
  });
}

buildSidebar();
render(currentSym);
</script>
